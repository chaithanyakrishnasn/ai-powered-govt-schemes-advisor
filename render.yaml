services:
  - type: web
    name: yojana-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false  # set manually in Render dashboard
      - key: ENVIRONMENT
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["https://yojana-ai.vercel.app","http://localhost:3000"]'
